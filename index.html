<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KSP Summer Task Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #FF7F50; --secondary: #2f3542; --bg: #f1f2f6; --ksp-green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-card { 
            width: 100%; max-width: 500px; background: #fff; 
            border-radius: 25px; padding: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px dashed #eee; padding-bottom: 15px; }
        .header img { width: 80px; height: auto; margin-bottom: 10px; }
        .header h2 { margin: 0; color: var(--secondary); font-size: 22px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--secondary); font-size: 14px; }
        
        input, textarea { 
            width: 100%; border: 2px solid #edeff2; padding: 12px; border-radius: 12px; 
            font-size: 16px !important; outline: none; transition: 0.3s; background: #f9fbff;
        }
        textarea { height: 180px; resize: none; }
        input:focus, textarea:focus { border-color: var(--primary); background: #fff; }

        .btns { display: flex; flex-direction: column; gap: 10px; }
        #btn-gen { 
            background: linear-gradient(135deg, #FF7F50, #ff6b81); 
            color: white; border: none; padding: 16px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        #result-area { display: none; margin-top: 25px; width: 100%; }
        #preview-img { width: 100%; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .share-btn { background: #25D366; color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* --- Capture Area (Export Design) --- */
        #capture-area { 
            position: absolute; left: -9999px; width: 800px; 
            background: white; 
        }
        .img-header { 
            background: #fff; padding: 40px; 
            display: flex; align-items: center; gap: 30px;
            border-bottom: 8px solid var(--primary);
        }
        .img-header img { width: 120px; height: 120px; object-fit: contain; }
        .img-header-text h1 { margin: 0; font-size: 45px; color: var(--secondary); text-transform: uppercase; }
        .img-header-text p { margin: 5px 0 0; font-size: 20px; color: var(--primary); font-weight: bold; }

        .img-content { padding: 50px 60px; min-height: 400px; background: #fff; }
        .img-subject { 
            background: #fff5f2; color: var(--primary); font-size: 32px; 
            font-weight: 800; padding: 15px 25px; border-radius: 10px;
            display: inline-block; margin-bottom: 30px; border-left: 10px solid var(--primary);
        }
        .img-text { 
            font-size: 28px; color: #333; line-height: 1.6; 
            white-space: pre-wrap;
        }
        .img-footer { 
            background: var(--secondary); color: white; padding: 30px; 
            text-align: center; font-size: 22px; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" alt="School Logo">
        <h2>Summer Homework Portal</h2>
    </div>

    <div class="form-group">
        <label>Subject / Topic</label>
        <input type="text" id="sub-n" value="English: Creative Writing ✍️">
    </div>

    <div class="form-group">
        <label>Homework Details</label>
        <textarea id="sub-w">Namaste bacho! ☀️

Is hafte aapko apni pasandida kahani (story) ke baare mein likhna hai:
1. Kahani ka naam aur uske mukhya kirdaar (characters).
2. Kahani se milne wali shiksha (moral).
3. Kahani ka ek sundar chitra banayein.

Handwriting saaf honi chahiye! 📝</textarea>
    </div>

    <div class="btns">
        <button id="btn-gen">📸 Create Image with Logo</button>
    </div>

    <div id="result-area">
        <img id="preview-img">
        <button class="share-btn" id="btn-share">WhatsApp par Share karein</button>
    </div>
</div>

<div id="capture-area">
    <div class="img-header">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" crossorigin="anonymous">
        <div class="img-header-text">
            <h1>KSP Public School</h1>
            <p>Varanasi, Uttar Pradesh</p>
        </div>
    </div>
    <div class="img-content">
        <div id="out-n" class="img-subject"></div>
        <div id="out-w" class="img-text"></div>
    </div>
    <div class="img-footer">
        ⛱️ Enjoy Your Summer Holidays ⛱️
    </div>
</div>

<script>
    document.getElementById('btn-gen').onclick = async () => {
        const n = document.getElementById('sub-n').value;
        const w = document.getElementById('sub-w').value;

        if(!n || !w) return alert("Dono box bhariye!");

        document.getElementById('out-n').innerText = n;
        document.getElementById('out-w').innerText = w;

        // Give a small delay to ensure rendering
        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('capture-area'), {
                scale: 2,
                useCORS: true,
                allowTaint: true
            });
            document.getElementById('preview-img').src = canvas.toDataURL("image/png");
            document.getElementById('result-area').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 500);
    };

    document.getElementById('btn-share').onclick = async () => {
        const blob = await (await fetch(document.getElementById('preview-img').src)).blob();
        const file = new File([blob], 'SummerHW.png', { type: 'image/png' });
        if (navigator.share) {
            navigator.share({ files: [file], title: 'Summer HW' });
        } else {
            alert("Please save the image manually.");
        }
    };
</script>
 <style>
    .modern-footer {
        margin-top: 20px;
        text-align: center;
        padding: 25px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f9f9f9;
        border-top: 1px solid #eee;
        color: #444;
        letter-spacing: 0.5px;
    }
    .modern-footer strong {
        color: #007AFF; /* Ek subtle blue accent */
        text-transform: uppercase;
        font-size: 14px;
    }
    .location-pin {
        color: #e74c3c; /* Varanasi ke liye red icon feel */
    }
</style>

<footer class="modern-footer">
    Designed & Maintained with ❤️ by <br>
    <strong>Suraj Patel</strong> | <span class="location-pin"></span> Varanasi
</footer>

</body>
</html>

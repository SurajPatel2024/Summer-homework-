 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KSP Summer Task Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #FF7F50; --secondary: #2f3542; --bg: #f1f2f6; --blue: #007AFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-card { 
            width: 100%; max-width: 500px; background: #fff; 
            border-radius: 25px; padding: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px dashed #eee; padding-bottom: 15px; }
        .header img { width: 80px; height: auto; margin-bottom: 10px; }
        .header h2 { margin: 0; color: var(--secondary); font-size: 22px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--secondary); font-size: 14px; }
        
        input, textarea { 
            width: 100%; border: 2px solid #edeff2; padding: 12px; border-radius: 12px; 
            font-size: 16px !important; outline: none; transition: 0.3s; background: #f9fbff;
        }
        textarea { height: 150px; resize: none; }
        input:focus, textarea:focus { border-color: var(--primary); background: #fff; }

        /* Button & Animation Styles */
        #btn-gen { 
            width: 100%; background: linear-gradient(135deg, #FF7F50, #ff6b81); 
            color: white; border: none; padding: 16px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        #btn-gen:disabled { opacity: 0.8; cursor: not-allowed; }

        /* Creating... Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading-text { animation: pulse 1s infinite; }

        #result-area { display: none; margin-top: 25px; width: 100%; text-align: center; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        #preview-img { width: 100%; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        #btn-download { 
            background: var(--blue); color: white; border: none; width: 100%; 
            padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- Capture Area --- */
        #capture-area { position: absolute; left: -9999px; width: 800px; background: white; }
        .img-header { background: #fff; padding: 40px; display: flex; align-items: center; gap: 30px; border-bottom: 8px solid var(--primary); }
        .img-header img { width: 120px; height: 120px; object-fit: contain; }
        .img-header-text h1 { margin: 0; font-size: 45px; color: var(--secondary); text-transform: uppercase; }
        .img-header-text p { margin: 5px 0 0; font-size: 20px; color: var(--primary); font-weight: bold; }
        .img-content { padding: 50px 60px; min-height: 400px; background: #fff; }
        .img-subject { background: #fff5f2; color: var(--primary); font-size: 32px; font-weight: 800; padding: 15px 25px; border-radius: 10px; display: inline-block; margin-bottom: 30px; border-left: 10px solid var(--primary); }
        .img-text { font-size: 28px; color: #333; line-height: 1.6; white-space: pre-wrap; }
        .img-footer { background: var(--secondary); color: white; padding: 30px; text-align: center; font-size: 22px; font-weight: 600; }

        .modern-footer { margin-top: 20px; text-align: center; padding: 25px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" alt="Logo">
        <h2>Summer Homework Portal</h2>
    </div>

    <div class="form-group">
        <label>Subject / Topic</label>
        <input type="text" id="sub-n" value="English: Creative Writing ✍️">
    </div>

    <div class="form-group">
        <label>Homework Details</label>
        <textarea id="sub-w">Namaste bacho! ☀️

Is hafte aapko apni pasandida kahani ke baare mein likhna hai.
Handwriting saaf honi chahiye! 📝</textarea>
    </div>

    <button id="btn-gen">📸 Create Homework Image</button>

    <div id="result-area">
        <img id="preview-img">
        <button id="btn-download">📥 Download Image</button>
    </div>
</div>

<div id="capture-area">
    <div class="img-header">
        <img src="https://i.ibb.co/SDLXGQ1b/images.png" crossorigin="anonymous">
        <div class="img-header-text">
            <h1>KSP Public School</h1>
            <p>Varanasi, Uttar Pradesh</p>
        </div>
    </div>
    <div class="img-content">
        <div id="out-n" class="img-subject"></div>
        <div id="out-w" class="img-text"></div>
    </div>
    <div class="img-footer">⛱️ Enjoy Your Summer Holidays ⛱️</div>
</div>

<footer class="modern-footer">
    Designed & Maintained with ❤️ by <br>
    <strong>Suraj Patel</strong> | Varanasi
</footer>

<script>
    const btnGen = document.getElementById('btn-gen');
    const btnDownload = document.getElementById('btn-download');
    const previewImg = document.getElementById('preview-img');
    const resultArea = document.getElementById('result-area');

    btnGen.onclick = async () => {
        const n = document.getElementById('sub-n').value;
        const w = document.getElementById('sub-w').value;

        if(!n || !w) return alert("Dono box bhariye!");

        // 1. Start Animation
        const originalText = btnGen.innerText;
        btnGen.disabled = true;
        btnGen.innerHTML = '<span class="loading-text">⏳ Creating Magic...</span>';

        document.getElementById('out-n').innerText = n;
        document.getElementById('out-w').innerText = w;

        setTimeout(async () => {
            try {
                const canvas = await html2canvas(document.getElementById('capture-area'), {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true
                });
                
                const imageData = canvas.toDataURL("image/png");
                previewImg.src = imageData;
                resultArea.style.display = 'block';

                btnDownload.onclick = () => {
                    const link = document.createElement('a');
                    link.download = `Homework.png`;
                    link.href = imageData;
                    link.click();
                };

                // 2. Stop Animation
                btnGen.disabled = false;
                btnGen.innerText = originalText;

                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (err) {
                alert("Error!");
                btnGen.disabled = false;
                btnGen.innerText = originalText;
            }
        }, 1200); // Thoda delay rakha hai taaki animation dikhe
    };
</script>

</body>
</html>
